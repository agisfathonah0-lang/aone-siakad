services:
  - type: web
    name: aone-siakad-api
    env: node
    buildCommand: cd backend && npm ci --include=dev && npm run build && cd ../frontend && npm ci --include=dev && npm run build && cp -r backend/src/database/migrations backend/dist/database/migrations
    startCommand: cd backend && node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: API_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_VENDOR_SECRET
        generateValue: true
      - key: JWT_CAMPUS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 8h
      - key: JWT_REFRESH_EXPIRES
        value: 30d
      - key: CORS_ORIGIN
        value: "*"
      - key: REDIS_HOST
        value: localhost
      - key: REDIS_PORT
        value: "6379"
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        value: "9000"
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@aone-campus.com
